<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIFT 收益總覽 | 美安台灣超連鎖®事業</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; background-color: #f4f7f9; }
        .vift-gradient { background: linear-gradient(90deg, #124d4a 0%, #29b8a8 100%); }
    </style>
</head>
<body>

    <nav class="bg-white border-b px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-6">
            <div class="flex flex-col border-r pr-4 border-gray-300">
                <span class="text-[#002855] font-bold text-lg leading-tight">美安台灣</span>
                <span class="text-[#002855] text-[10px] tracking-[2px]">超連鎖®事業</span>
            </div>
            <div class="hidden md:flex space-x-5 text-sm font-medium text-blue-900">
                <span class="cursor-pointer">訂購</span>
                <span class="cursor-pointer text-teal-700 border-b-2 border-teal-700">事業</span>
                <span class="cursor-pointer">資訊</span>
                <span class="cursor-pointer">我的帳戶</span>
            </div>
        </div>
        <div class="flex items-center space-x-4 text-xs text-gray-500">
            <img src="https://flagcdn.com/w20/tw.png" width="18" alt="TW">
            <span>TW</span>
            <span>🛒</span>
        </div>
    </nav>

    <div class="vift-gradient text-white p-8 md:px-20 flex flex-col md:flex-row justify-between items-center relative min-h-[280px]">
        <div class="z-10">
            <h1 class="text-5xl font-extrabold italic mb-6 tracking-tighter">VIFT</h1>
            <p class="text-xl opacity-90 mb-1">恭喜你，峻！</p>
            <div class="text-3xl font-bold flex items-baseline">
                <span>NT$</span>
                <span id="header-cash" class="ml-1 text-4xl">0</span>
            </div>
        </div>
        
        <div class="bg-[#001f3f]/90 p-6 rounded-md shadow-2xl mt-6 md:mt-0 min-w-[280px] border border-white/10 backdrop-blur-sm">
            <div class="mb-5">
                <p class="text-xs text-gray-400 mb-1">現金回饋</p>
                <p class="text-3xl font-bold text-white flex items-baseline">
                    <span class="text-sm mr-1 italic">NT$</span>
                    <span id="box-cash">0</span>
                </p>
            </div>
            <div class="mb-5 border-t border-gray-600/50 pt-3">
                <p class="text-xs text-gray-400 mb-1">待處理現金</p>
                <p class="text-xl font-bold text-white flex items-baseline">
                    <span class="text-sm mr-1 italic">NT$</span>
                    <span id="pending-cash">0</span>
                </p>
            </div>
            <div class="border-t border-gray-600/50 pt-3">
                <p class="text-xs text-gray-400 mb-1">累計現金收入</p>
                <p class="text-xl font-bold text-teal-400 flex items-baseline">
                    <span class="text-sm mr-1 italic text-white">NT$</span>
                    <span id="total-cash">0</span>
                </p>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto p-6">
        <div class="grid grid-cols-3 bg-white border rounded-lg shadow-sm divide-x overflow-hidden">
            <div class="p-4 text-center">
                <p class="text-xs text-gray-400">零售利潤</p>
                <p id="profit" class="font-bold text-gray-800">NT$0</p>
            </div>
            <div class="p-4 text-center bg-gray-50/50">
                <p class="text-xs text-red-500 font-bold italic">● 現金回饋</p>
                <p id="cashback" class="font-bold text-gray-800">NT$0</p>
            </div>
            <div class="p-4 text-center">
                <p class="text-xs text-gray-400">累計提領金額</p>
                <p id="withdrawn" class="font-bold text-gray-800">NT$0</p>
            </div>
        </div>
    </div>

    <script>
        // 設定初始金額 (如果 localStorage 沒資料就會用這個)
        const initialData = {
            headerCash: 75999,
            boxCash: 74999,
            pendingCash: 124324,
            totalCash: 751815,
            profit: 650324,
            cashback: 751519,
            withdrawn: 618215
        };

        // 隨機增加幾百到幾千 (200 ~ 3500 之間)
        function getRandomBoost() {
            return Math.floor(Math.random() * (3500 - 200 + 1)) + 200;
        }

        function updateAndSaveData() {
            let savedData = JSON.parse(localStorage.getItem('vift_data'));
            
            if (!savedData) {
                // 第一次進入，使用初始值
                savedData = initialData;
            } else {
                // 重新整理，開始自動加錢
                const boost = getRandomBoost();
                savedData.headerCash += boost;
                savedData.boxCash += boost;
                savedData.totalCash += boost;
                savedData.cashback += boost;
                // 待處理現金也可以隨機動一下
                savedData.pendingCash += Math.floor(Math.random() * 500);
            }
            
            localStorage.setItem('vift_data', JSON.stringify(savedData));
            return savedData;
        }

        function animateValue(id, end, duration) {
            const obj = document.getElementById(id);
            if (!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const value = Math.floor(progress * end);
                obj.innerHTML = value.toLocaleString();
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        window.onload = () => {
            const data = updateAndSaveData();
            
            // 執行數字跳動動畫
            animateValue("header-cash", data.headerCash, 1200);
            animateValue("box-cash", data.boxCash, 1200);
            animateValue("pending-cash", data.pendingCash, 1500);
            animateValue("total-cash", data.totalCash, 1800);
            
            // 靜態更新下方小字
            document.getElementById("profit").innerText = "NT$" + data.profit.toLocaleString();
            document.getElementById("cashback").innerText = "NT$" + data.cashback.toLocaleString();
            document.getElementById("withdrawn").innerText = "NT$" + data.withdrawn.toLocaleString();
        };
    </script>
</body>
</html>
